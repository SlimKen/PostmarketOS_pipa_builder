name: Build postmarketOS for xiaomi-pipa

on:
  workflow_dispatch:
    inputs:
      ui:
        description: "User interface to build"
        required: true
        default: "phosh"
        type: choice
        options:
          - plasma-desktop
          - phosh
          - plasma-mobile
          - sxmo-de-sway
          - none
      extra_space_mb:
        description: "Extra rootfs free space in MB"
        required: false
        default: "0"
  schedule:
    - cron: "14 3 2 * *"

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Free up disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache/CodeQL /usr/share/swift
          sudo apt-get clean
          sudo apt-get autoremove -y
          sudo rm -rf /var/cache/apt /var/lib/apt/lists/*
          df -h

      - name: Checkout
        uses: actions/checkout@v6

      - name: Install host dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y python3 openssl git qemu-user-static binfmt-support p7zip-full
          sudo systemctl start binfmt-support
          sudo update-binfmts --enable qemu-aarch64
          git clone --depth=1 https://gitlab.postmarketos.org/postmarketOS/pmbootstrap.git ~/pmbootstrap
          mkdir -p ~/.local/bin
          ln -s "$HOME/pmbootstrap/pmbootstrap.py" ~/.local/bin/pmbootstrap
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Restore pmbootstrap cache
        uses: actions/cache@v5
        with:
          path: |
            ~/.local/var/pmbootstrap/packages
            ~/.local/var/pmbootstrap/cache_apk_index
            ~/.local/var/pmbootstrap/cache_ccache
          key: pmos-pipa-${{ github.event.inputs.ui || 'plasma-desktop' }}-${{ hashFiles('pmbootstrap_v3.cfg') }}-${{ github.run_id }}
          restore-keys: |
            pmos-pipa-${{ github.event.inputs.ui || 'plasma-desktop' }}-${{ hashFiles('pmbootstrap_v3.cfg') }}-
            pmos-pipa-${{ github.event.inputs.ui || 'plasma-desktop' }}-

      - name: Write pmbootstrap config
        run: |
          mkdir -p ~/.config
          UI="${{ github.event.inputs.ui || 'plasma-desktop' }}"
          EXTRA_SPACE="${{ github.event.inputs.extra_space_mb || '0' }}"
          sed \
            -e "s|^ui = .*|ui = ${UI}|" \
            -e "s|^extra_space = .*|extra_space = ${EXTRA_SPACE}|" \
            -e "s|^work = .*|work = /home/runner/.local/var/pmbootstrap|" \
            pmbootstrap_v3.cfg > ~/.config/pmbootstrap_v3.cfg
          cat ~/.config/pmbootstrap_v3.cfg

      - name: Initialize pmbootstrap
        env:
          PMB_FDE_PASSWORD: "147147"
        run: yes "" | pmbootstrap --config ~/.config/pmbootstrap_v3.cfg init

      - name: Pull latest pmaports
        run: pmbootstrap --config ~/.config/pmbootstrap_v3.cfg --details-to-stdout -y pull

      - name: Build images
        env:
          PMB_FDE_PASSWORD: "147147"
        run: |
          pmbootstrap --config ~/.config/pmbootstrap_v3.cfg --details-to-stdout -y install --fde --password 147147 2>&1 | tee build.log
          echo "=== Build Summary ==="
          tail -50 build.log
        timeout-minutes: 300

      - name: Export images
        run: |
          mkdir -p /tmp/pmos-export
          cp -rL /home/runner/.local/var/pmbootstrap/chroot_rootfs_xiaomi-pipa/boot/* /tmp/pmos-export
          cp -rL /home/runner/.local/var/pmbootstrap/chroot_native/home/pmos/rootfs/xiaomi-pipa.img /tmp/pmos-export
          cp -rL /home/runner/.local/var/pmbootstrap/chroot_buildroot_aarch64/var/lib/postmarketos-android-recovery-installer/pmos-xiaomi-pipa.zip /tmp/pmos-export
          ls -lh /tmp/pmos-export/
    
          # Verify expected files exist
          if [ ! -f /tmp/pmos-export/xiaomi-pipa.img ]; then
            echo "ERROR: Expected files not found in export directory"
            echo "=== pmbootstrap status ==="
            pmbootstrap status
            exit 1
          fi

      - name: Resolve symlinks and compress
        run: |
          # Copy everything from /tmp/pmos-export, resolving all symlinks to real files
          mkdir -p /tmp/pmos-real
          cp -rL /tmp/pmos-export/. /tmp/pmos-real/
          echo "=== Real files ==="
          ls -lh /tmp/pmos-real/

          # Compress into a .7z archive, splitting into 1GB volumes if needed
          cd /tmp
          7z a -mx=2 -v1g pmos-xiaomi-pipa.7z pmos-real/
          echo "=== Archive(s) ==="
          ls -lh /tmp/pmos-xiaomi-pipa*

      - name: Set release tag
        run: echo "RELEASE_TAG=build-$(date -u +'%Y%m%d-%H%M')" >> "$GITHUB_ENV"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          name: "postmarketOS pipa - ${{ github.event.inputs.ui || 'plasma-desktop' }} - ${{ env.RELEASE_TAG }}"
          body: |
            ## postmarketOS for Xiaomi Pad 6 (xiaomi-pipa)

            | Field    | Value |
            |----------|-------|
            | Device   | Xiaomi Pad 6 (xiaomi-pipa) |
            | UI       | ${{ github.event.inputs.ui || 'plasma-desktop' }} |
            | Built    | ${{ env.RELEASE_TAG }} |
            | Branch   | pmaports edge |

            ## Contents of the archive

            | File | Description |
            |------|-------------|
            | `boot.img` | Kernel + initramfs (fastboot) |
            | `xiaomi-pipa.img` | Root filesystem image |
            | `pmos-xiaomi-pipa.zip` | Android recovery flashable zip |

            If the archive is split into multiple `.7z` parts, download all of them before extracting.
            Extract with: `7z x pmos-xiaomi-pipa.7z` (or `pmos-xiaomi-pipa.7z.001` if split)

            ## Flashing instructions

            Prerequisites: unlocked bootloader, fastboot installed on your PC.

            ```sh
            # Boot into fastboot mode
            # Power off, then hold Volume Down + Power

            fastboot erase dtbo
            fastboot flash boot boot.img
            fastboot flash userdata xiaomi-pipa-root.img
            fastboot reboot
            ```

            Default login: username `user`, password `147147`

            Warning: flashing will wipe userdata. Back up your Android data first.
          files: /tmp/pmos-xiaomi-pipa.7z*
          fail_on_unmatched_files: true
